name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: openclaw-gateway
  AR_REPOSITORY: openclaw

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── GCP Auth (Service Account Key) ─────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ─── Enable APIs (idempotent) ───────────────────────────────
      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            --project=${{ env.GCP_PROJECT_ID }}

      # ─── Artifact Registry ─────────────────────────────────────
      - name: Create Artifact Registry repo (if not exists)
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPOSITORY }} \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.AR_REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="OpenClaw Gateway images"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ─── Build & Push ───────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        run: |
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}"
          IMAGE_TAG="${{ github.sha }}"
          IMAGE_URI="${REGISTRY}/openclaw-gateway:${IMAGE_TAG}"
          IMAGE_LATEST="${REGISTRY}/openclaw-gateway:latest"

          echo "Building ${IMAGE_URI}..."
          docker build -t "${IMAGE_URI}" -t "${IMAGE_LATEST}" .
          docker push "${IMAGE_URI}"
          docker push "${IMAGE_LATEST}"

          echo "image=${IMAGE_URI}" >> $GITHUB_OUTPUT

      # ─── Store Gemini API Key in Secret Manager ─────────────────
      - name: Sync GEMINI_API_KEY to Secret Manager
        run: |
          # Create the secret if it doesn't exist, then add a new version
          gcloud secrets describe GEMINI_API_KEY \
            --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud secrets create GEMINI_API_KEY \
            --project=${{ env.GCP_PROJECT_ID }} \
            --replication-policy=automatic

          echo -n "${{ secrets.GEMINI_API_KEY }}" | \
            gcloud secrets versions add GEMINI_API_KEY \
              --project=${{ env.GCP_PROJECT_ID }} \
              --data-file=-

      # ─── Store Gateway Token in Secret Manager ──────────────────
      - name: Sync OPENCLAW_GATEWAY_TOKEN to Secret Manager
        run: |
          gcloud secrets describe OPENCLAW_GATEWAY_TOKEN \
            --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud secrets create OPENCLAW_GATEWAY_TOKEN \
            --project=${{ env.GCP_PROJECT_ID }} \
            --replication-policy=automatic

          # Only add a new version if the user has set the secret in GitHub
          if [ -n "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" ]; then
            echo -n "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}" | \
              gcloud secrets versions add OPENCLAW_GATEWAY_TOKEN \
                --project=${{ env.GCP_PROJECT_ID }} \
                --data-file=-
          fi

      # ─── Grant Cloud Run access to secrets ─────────────────────
      - name: Grant Secret Manager access to Cloud Run
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.GCP_PROJECT_ID }} --format='value(projectNumber)')
          SA_EMAIL="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          for SECRET in GEMINI_API_KEY OPENCLAW_GATEWAY_TOKEN; do
            gcloud secrets add-iam-policy-binding ${SECRET} \
              --project=${{ env.GCP_PROJECT_ID }} \
              --member="serviceAccount:${SA_EMAIL}" \
              --role="roles/secretmanager.secretAccessor" \
              --quiet 2>/dev/null || true
          done

      # ─── Deploy to Cloud Run ────────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.build.outputs.image }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          flags: |
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=1
            --max-instances=3
            --no-cpu-throttling
            --allow-unauthenticated
            --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENCLAW_GATEWAY_TOKEN=OPENCLAW_GATEWAY_TOKEN:latest

      # ─── Output ─────────────────────────────────────────────────
      - name: Show deployment info
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "============================================="
          echo "✅ Deployment successful!"
          echo "🦞 Service URL: ${SERVICE_URL}"
          echo "🖥️  Control UI:  ${SERVICE_URL}/"
          echo "============================================="
